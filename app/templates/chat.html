{% extends "base.html" %}
{% block title %}Chat — OpenAgent{% endblock %}
{% block page_title %}Chat{% endblock %}

{% block content %}
<div class="h-full flex flex-col max-w-3xl mx-auto"
     x-data="chatApp()" x-init="connect()">

  <!-- Message thread -->
  <div class="flex-1 overflow-y-auto space-y-4 mb-4 min-h-0" x-ref="thread">

    <!-- Stub notice -->
    <div class="flex justify-center">
      <span class="text-xs text-slate-500 bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
        Agent loop not yet built — responses are stubs
      </span>
    </div>

    <!-- Messages -->
    <template x-for="(msg, i) in messages" :key="i">
      <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
        <div :class="msg.role === 'user'
                  ? 'bg-teal-600/20 border border-teal-500/30 text-slate-100 rounded-2xl rounded-tr-sm'
                  : 'bg-slate-800 border border-slate-700 text-slate-300 rounded-2xl rounded-tl-sm'"
             class="max-w-lg px-4 py-2.5 text-sm">
          <p x-text="msg.content"></p>
        </div>
      </div>
    </template>

    <!-- Typing indicator -->
    <div x-show="typing" class="flex justify-start">
      <div class="bg-slate-800 border border-slate-700 rounded-2xl rounded-tl-sm px-4 py-2.5">
        <span class="inline-flex gap-1">
          <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:0ms]"></span>
          <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:150ms]"></span>
          <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:300ms]"></span>
        </span>
      </div>
    </div>

  </div>

  <!-- Input bar -->
  <form @submit.prevent="send()" class="flex gap-2 flex-shrink-0">
    <input
      x-model="draft"
      :disabled="!connected"
      @keydown.enter.prevent="send()"
      type="text"
      placeholder="Message the agent…"
      class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm
             text-slate-100 placeholder-slate-500 focus:outline-none focus:border-teal-500
             disabled:opacity-40"
    />
    <button type="submit"
            :disabled="!connected || !draft.trim()"
            class="bg-teal-500 hover:bg-teal-400 disabled:opacity-40 text-slate-900 font-semibold
                   px-4 py-2.5 rounded-xl text-sm transition-colors">
      Send
    </button>
  </form>

  <!-- Connection status -->
  <p class="mt-2 text-xs text-center"
     :class="connected ? 'text-green-400' : 'text-red-400'"
     x-text="connected ? 'Connected' : 'Disconnected — reconnecting…'">
  </p>

</div>

<script>
function chatApp() {
  return {
    messages: [],
    draft: "",
    typing: false,
    connected: false,
    ws: null,

    connect() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      this.ws = new WebSocket(`${proto}://${location.host}/ws/chat`);

      this.ws.onopen = () => { this.connected = true; };
      this.ws.onclose = () => {
        this.connected = false;
        setTimeout(() => this.connect(), 3000);
      };
      this.ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        this.typing = false;
        this.messages.push(msg);
        this.$nextTick(() => this.scrollToBottom());
      };
    },

    send() {
      if (!this.draft.trim() || !this.connected) return;
      const text = this.draft.trim();
      this.messages.push({ role: "user", content: text });
      this.ws.send(text);
      this.draft = "";
      this.typing = true;
      this.$nextTick(() => this.scrollToBottom());
    },

    scrollToBottom() {
      const el = this.$refs.thread;
      el.scrollTop = el.scrollHeight;
    }
  }
}
</script>
{% endblock %}
