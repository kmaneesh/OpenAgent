{% extends "base.html" %}
{% block title %}Logs — OpenAgent{% endblock %}
{% block page_title %}Live Logs{% endblock %}

{% block content %}
<div class="flex flex-col h-full gap-3" x-data="logsApp()" x-init="connect()">

  <!-- Controls -->
  <div class="flex items-center gap-3 flex-shrink-0">
    <!-- Level filters -->
    <div class="flex gap-1">
      {% for level in ["ALL", "DEBUG", "INFO", "WARNING", "ERROR"] %}
      <button @click="filter = '{{ level }}'"
              :class="filter === '{{ level }}'
                ? 'bg-teal-500/20 border-teal-500 text-teal-400'
                : 'border-slate-700 text-slate-400 hover:border-slate-500'"
              class="border rounded-lg px-3 py-1 text-xs font-medium transition-colors">
        {{ level }}
      </button>
      {% endfor %}
    </div>

    <div class="flex-1"></div>

    <!-- Auto-scroll toggle -->
    <button @click="autoScroll = !autoScroll"
            :class="autoScroll ? 'text-teal-400' : 'text-slate-500'"
            class="text-xs flex items-center gap-1.5">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
      </svg>
      <span x-text="autoScroll ? 'Auto-scroll on' : 'Auto-scroll off'"></span>
    </button>

    <!-- Clear -->
    <button @click="lines = []" class="text-xs text-slate-500 hover:text-slate-300">Clear</button>

    <!-- SSE indicator -->
    <span class="inline-flex items-center gap-1.5 text-xs"
          :class="streaming ? 'text-green-400' : 'text-red-400'">
      <span class="w-1.5 h-1.5 rounded-full"
            :class="streaming ? 'bg-green-400 animate-pulse' : 'bg-red-400'"></span>
      <span x-text="streaming ? 'Live' : 'Disconnected'"></span>
    </span>
  </div>

  <!-- Log output -->
  <div class="flex-1 overflow-y-auto bg-slate-950 border border-slate-700 rounded-xl p-4 font-mono text-xs leading-5 min-h-0"
       x-ref="logbox"
       @scroll="checkScroll()">
    <template x-for="(line, i) in filteredLines" :key="i">
      <div :class="levelClass(line)" x-text="line"></div>
    </template>
    <div x-show="filteredLines.length === 0" class="text-slate-600 text-center py-8">
      Waiting for log entries…
    </div>
  </div>

</div>

<script>
function logsApp() {
  return {
    lines: [],
    filter: "ALL",
    autoScroll: true,
    streaming: false,
    es: null,

    get filteredLines() {
      if (this.filter === "ALL") return this.lines;
      return this.lines.filter(l => l.includes(` ${this.filter} `) || l.includes(` ${this.filter}  `));
    },

    connect() {
      this.es = new EventSource("/stream/logs");
      this.es.onopen = () => { this.streaming = true; };
      this.es.onerror = () => { this.streaming = false; };
      this.es.onmessage = (e) => {
        this.streaming = true;
        const line = JSON.parse(e.data);
        this.lines.push(line);
        if (this.lines.length > 2000) this.lines.shift();
        if (this.autoScroll) this.$nextTick(() => this.scrollBottom());
      };
    },

    scrollBottom() {
      const el = this.$refs.logbox;
      el.scrollTop = el.scrollHeight;
    },

    checkScroll() {
      const el = this.$refs.logbox;
      this.autoScroll = el.scrollTop + el.clientHeight >= el.scrollHeight - 20;
    },

    levelClass(line) {
      if (line.includes(" ERROR "))   return "text-red-400";
      if (line.includes(" WARNING ")) return "text-yellow-400";
      if (line.includes(" INFO ") || line.includes(" INFO  ")) return "text-slate-300";
      return "text-slate-500";
    }
  }
}
</script>
{% endblock %}
